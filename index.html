<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>姐姐我怕怕 - 签到</title>

<style>
    body {
        font-family: system-ui, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f4f7f9;
    }
    .box {
        background: white;
        padding: 35px 45px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        text-align: center;
        width: 440px;
    }
    h1 { margin-top: 0; color: #2c3e50; }
    .status {
        margin-top: 20px;
        padding: 12px;
        border-radius: 8px;
        font-size: 15px;
    }
    .loading { background: #fff3cd; color: #856404; }
    .success { background: #d4edda; color: #155724; }
    .error   { background: #f8d7da; color: #721c24; }
    button {
        margin-top: 15px;
        padding: 10px 16px;
        border: none;
        border-radius: 6px;
        background: #3498db;
        color: white;
        cursor: pointer;
    }
</style>
</head>

<body>
<div class="box">
    <h1>🤖 姐姐我怕怕 - 签到</h1>
    <p>正在启动 Automa 工作流</p>

    <div id="status" class="status loading">⏳ 正在尝试触发...</div>

    <button onclick="location.reload()">🔄 手动重试</button>
</div>

<script>
const PUBLIC_ID = 'bing-workflow';
const status = document.getElementById('status');

let tried = false;

function triggerWorkflow() {
    if (tried) return;
    tried = true;

    try {
        if (!chrome?.runtime) {
            throw new Error('未检测到 Automa / Chrome runtime');
        }

        chrome.runtime.sendMessage(
            'gdpnknjilelfkflniamnimnkkcpdmfkpp', // Automa Extension ID
            {
                type: 'execute-workflow',
                data: { publicId: PUBLIC_ID }
            },
            res => {
                if (res?.success) {
                    status.className = 'status success';
                    status.innerHTML = '✅ 工作流已成功触发';
                } else {
                    throw new Error('Automa 返回失败');
                }
            }
        );
    } catch (e) {
        status.className = 'status error';
        status.innerHTML = `❌ 触发失败：${e.message}`;
        console.error(e);
    }
}

// 延迟触发，确保 Automa 已注入
setTimeout(triggerWorkflow, 2500);
</script>
</body>
</html>
