<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
	<link rel="icon" href="/favicon.png">
    <title>Automa 工作流启动页</title>

    <!-- ✅ 每 15 秒自动刷新一次，用于兜底 -->
    <meta http-equiv="refresh" content="15">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            text-align: center;
            padding-top: 80px;
        }
        .box {
            display: inline-block;
            background: #fff;
            border: 1px solid #ddd;
            padding: 30px 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .status {
            margin-top: 20px;
            font-size: 16px;
        }
        .success {
            color: #2e7d32;
        }
        .warn {
            color: #f57c00;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>🚀 Automa 工作流启动中</h2>
    <div id="status" class="status">正在初始化...</div>
</div>

<script>
    const PUBLIC_ID = 'bing-workflow';
    const statusDiv = document.getElementById('status');

    /**
     * ✅ 核心防重逻辑
     * sessionStorage 只在当前 Chrome 实例有效
     * 刷新 / 重新打开页面都不会重复触发
     */
    if (sessionStorage.getItem('workflowTriggered')) {
        statusDiv.className = 'warn';
        statusDiv.innerHTML = '⚠️ 本窗口工作流已触发，不会重复执行。';
    } else {
        window.addEventListener('load', function () {
            try {
                // 打标记（最重要的一步）
                sessionStorage.setItem('workflowTriggered', 'true');

                // ✅ 原始 Automa 触发逻辑（保持不变）
                window.dispatchEvent(new CustomEvent('automa:execute-workflow', {
                    detail: { publicId: PUBLIC_ID }
                }));

                statusDiv.className = 'success';
                statusDiv.innerHTML = '✅ 工作流触发成功！';
            } catch (e) {
                statusDiv.className = 'warn';
                statusDiv.innerHTML = '❌ 触发失败：' + e.message;
            }
        });
    }
</script>

</body>
</html>
