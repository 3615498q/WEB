<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>姐姐我怕怕 - 签到</title>

<style>
    body {
        font-family: system-ui, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f4f7f9;
    }
    .box {
        background: white;
        padding: 35px 45px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        text-align: center;
        width: 460px;
    }
    h1 { margin-top: 0; color: #2c3e50; }
    .status {
        margin-top: 20px;
        padding: 12px;
        border-radius: 8px;
        font-size: 15px;
    }
    .loading { background: #fff3cd; color: #856404; }
    .success { background: #d4edda; color: #155724; }
    .error   { background: #f8d7da; color: #721c24; }
</style>
</head>

<body>
<div class="box">
    <h1>🤖 姐姐我怕怕 - 签到</h1>
    <p>正在启动 Automa 工作流</p>

    <div id="status" class="status loading">
        ⏳ 正在尝试触发工作流...
    </div>
</div>

<script>
const PUBLIC_ID = 'bing-workflow';
const status = document.getElementById('status');

// 防止死循环标记
if (sessionStorage.getItem('automa_reloaded')) {
    status.className = 'status error';
    status.innerHTML = '❌ 已自动重载一次仍失败，请检查 Automa';
} else {
    setTimeout(() => {
        try {
            if (!chrome?.runtime) {
                throw new Error('未检测到 Automa');
            }

            chrome.runtime.sendMessage(
                'infppggnoaenmfagbfknfkancpbljcca', // Automa Extension ID
                {
                    type: 'execute-workflow',
                    data: { publicId: PUBLIC_ID }
                },
                res => {
                    if (res?.success) {
                        status.className = 'status success';
                        status.innerHTML = '✅ 工作流已成功触发';
                    } else {
                        throw new Error('工作流未执行');
                    }
                }
            );

            // 超时兜底：3 秒没成功就 reload
            setTimeout(() => {
                sessionStorage.setItem('automa_reloaded', '1');
                location.reload(true);
            }, 3000);

        } catch (e) {
            sessionStorage.setItem('automa_reloaded', '1');
            location.reload(true);
        }
    }, 2500);
}
</script>
</body>
</html>
