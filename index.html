<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姐姐我怕怕 - 签到</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f7f9;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 {
            margin-top: 0;
            color: #2c3e50;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            line-height: 1.6;
        }
        .loading { 
            color: #856404; 
            background: #fff3cd; 
            border: 1px solid #ffeeba;
        }
        .success { 
            color: #155724; 
            background: #d4edda; 
            border: 1px solid #c3e6cb;
        }
        .error { 
            color: #721c24; 
            background: #f8d7da; 
            border: 1px solid #f5c6cb;
        }
        .hint {
            margin-top: 25px;
            font-size: 14px;
            color: #666;
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        code {
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 姐姐我怕怕 - 签到</h1>
        <p>正在尝试启动工作流，请稍候...</p>

        <div id="status" class="status loading">
            ⏳ 正在初始化并检查环境...
        </div>

        <div class="hint">
            <strong>故障排除提示：</strong>
            <ul>
                <li>请确保已安装并启用 Automa 扩展。</li>
                <li>请确保工作流的 <code>Public ID</code> 设置为 <code>bing-workflow</code>。</li>
                <li>如果首次访问失败，请尝试刷新页面。</li>
            </ul>
        </div>
    </div>

    <script>
        const PUBLIC_ID = 'bing-workflow';
        const statusDiv = document.getElementById('status');

        // 防止无限刷新
        if (sessionStorage.getItem('automa_reloaded')) {
            statusDiv.className = 'status error';
            statusDiv.innerHTML = '❌ 已自动重载一次仍失败，请检查 Automa 扩展状态。';
        } else {
            function triggerWorkflow() {
                try {
                    if (!chrome?.runtime) {
                        throw new Error('Automa 扩展未检测到');
                    }

                    chrome.runtime.sendMessage(
                        'infppggnoaenmfagbfknfkancpbljcca', // Automa Extension ID
                        {
                            type: 'execute-workflow',
                            data: { publicId: PUBLIC_ID }
                        },
                        res => {
                            if (res?.success) {
                                statusDiv.className = 'status success';
                                statusDiv.innerHTML = `
                                    ✅ 触发信号已成功发送！<br>
                                    工作流应在后台开始执行。<br>
                                    <small>（如果没反应，请检查 Automa 工作流配置）</small>
                                `;
                            } else {
                                throw new Error('Automa 返回失败');
                            }
                        }
                    );

                    // 超时兜底
                    setTimeout(() => {
                        sessionStorage.setItem('automa_reloaded', '1');
                        location.reload(true);
                    }, 6000);

                } catch (e) {
                    sessionStorage.setItem('automa_reloaded', '1');
                    location.reload(true);
                }
            }

            window.addEventListener('load', () => {
                setTimeout(triggerWorkflow, 3000);
            });
        }
    </script>
</body>
</html>
