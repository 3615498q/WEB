<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>姐姐我怕怕 - 签到</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        .success { color: #155724; background: #d4edda; padding: 12px; border-radius: 8px; }
        .error { color: #721c24; background: #f8d7da; padding: 12px; border-radius: 8px; }
        .loading { color: #856404; background: #fff3cd; padding: 12px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>🤖 正在启动工作流...</h1>
    <div id="status" class="loading">⏳ 正在触发，请稍候...</div>

    <script>
        const PUBLIC_ID = 'bing-workflow';
        const statusDiv = document.getElementById('status');

        // 页面加载完成后自动触发
        window.addEventListener('load', function() {
            try {
                // 发送触发信号
                window.dispatchEvent(new CustomEvent('automa:execute-workflow', {
                    detail: { publicId: PUBLIC_ID }
                }));
                statusDiv.className = 'success';
                statusDiv.innerHTML = '✅ 触发信号已发送！工作流将在目标页面运行。<br>如果工作流没有执行，请确保：<br>1. 工作流已导入为本地工作流<br>2. 工作流 Public ID 设置为 "bing-workflow"<br>3. 工作流开头有「新建标签页」模块打开 bing.com';
            } catch(e) {
                statusDiv.className = 'error';
                statusDiv.innerHTML = '❌ 触发失败：' + e.message + '<br>请确保 Automa 扩展已安装并启用。';
            }
        });
    </script>
</body>
</html>
